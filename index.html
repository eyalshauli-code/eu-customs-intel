<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>EU Customs — AI Procurement Intelligence</title>
<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Carlito:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0e1a}
body{font-family:'Carlito',Calibri,sans-serif;font-size:17px;line-height:1.6;color:#e8edf5}
:root{
  --bg:#0a0e1a;--bg2:#111827;--bg3:#1a2235;--bg4:#1e2d45;h
  --accent:#3b82f6;--accent2:#06b6d4;--accent3:#8b5cf6;
  --green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--orange:#f97316;
  --text:#e8edf5;--text2:#b8c8dc;--text3:#8aa0b8;
  --border:#1e3a5f;--border2:#2d4a6e;
}
.app{width:100vw;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0;position:relative;flex-wrap:wrap}
.topbar-title{font-size:16px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
.sw{position:relative;flex:1;max-width:300px;min-width:160px}
.sw input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:8px 12px 8px 36px;color:var(--text);font-size:15px;font-family:inherit}
.sw input::placeholder{color:var(--text3)}
.sw svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);pointer-events:none}
#gsrP{position:absolute;top:52px;left:0;width:340px;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;z-index:300;max-height:320px;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.7)}
.gsr-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);font-size:15px;color:var(--text)}
.gsr-item:hover,.gsr-hi{background:var(--bg4)}
.gsr-sub{font-size:13px;color:var(--text3);margin-top:2px}
.nav{background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;gap:4px;flex-wrap:wrap;flex-shrink:0}
.nb{font-size:14px;padding:7px 14px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-family:inherit;white-space:nowrap}
.nb:hover:not(.active){background:var(--bg3);color:var(--text)}
.nb.active{background:var(--accent);border-color:var(--accent);color:#fff}
.nb.pot{border-color:var(--accent3);color:var(--accent3)}
.nb.pot.active{background:var(--accent3);border-color:var(--accent3);color:#fff}
.slide{flex:1;overflow-y:auto;padding:24px 30px;background:var(--bg)}
.sh{font-size:22px;font-weight:700;margin-bottom:20px;padding-bottom:10px;border-bottom:2px solid var(--accent);color:var(--accent2);letter-spacing:.02em}
.rb{font-size:13px;padding:3px 10px;border-radius:10px;font-weight:700}
.rf{background:#14532d;color:#86efac}.rn{background:#1c3151;color:#93c5fd}.rh{background:#450a0a;color:#fca5a5}
.pb-badge{background:#2e1065;color:#c4b5fd;border:1px solid #4c1d95;font-size:12px;padding:2px 8px;border-radius:8px}
.prb{font-size:13px;padding:3px 10px;border-radius:6px;font-weight:700;display:inline-block}
.pr-a{background:#064e3b;color:#6ee7b7;border:1px solid #065f46}
.pr-p{background:#1c1917;color:#d6d3d1;border:1px solid #292524}
.pr-f{background:#450a0a;color:#fca5a5;border:1px solid #7f1d1d}
.pr-n{background:#1e1a2e;color:#c4b5fd;border:1px solid #3730a3}
.ds{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:16px}
.dst{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--accent2);margin-bottom:12px;display:flex;align-items:center;gap:7px;border-bottom:1px solid var(--border);padding-bottom:8px}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;display:inline-block}
.dr{display:flex;gap:12px;margin-bottom:9px;font-size:16px;line-height:1.5;align-items:flex-start}
.dl{color:var(--text3);min-width:170px;flex-shrink:0;padding-top:2px}
.dv{color:var(--text);flex:1}
.dt{font-size:16px;color:var(--text2);line-height:1.7}
.tab-bar{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:18px;flex-wrap:wrap}
.tab{font-size:14px;padding:8px 17px;cursor:pointer;border-bottom:2px solid transparent;color:var(--text2);font-family:inherit;background:none;border-top:none;border-left:none;border-right:none;white-space:nowrap}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-del{font-size:11px;color:var(--red);cursor:pointer;margin-left:4px;padding:0 3px;border-radius:3px}
.tab-del:hover{background:#450a0a}
.ef{width:100%;background:var(--bg4);border:1px solid var(--border2);border-radius:8px;padding:10px 13px;color:var(--text);font-size:16px;font-family:inherit;line-height:1.6;resize:vertical;min-height:80px}
.ef:focus{outline:none;border-color:var(--accent)}
.ei{background:var(--bg4);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:16px;font-family:inherit;width:100%;padding:7px 10px}
.ei:focus{outline:none;border-color:var(--accent)}
.sbtn{font-size:14px;padding:7px 16px;border-radius:6px;border:1px solid var(--green);background:transparent;color:var(--green);cursor:pointer;font-family:inherit;margin-top:8px}
.sbtn:hover{background:#064e3b}
.dbtn{font-size:13px;padding:4px 10px;border-radius:6px;border:1px solid var(--red);background:transparent;color:var(--red);cursor:pointer;font-family:inherit}
.dbtn:hover{background:#450a0a}
.note-entry{background:var(--bg4);border:1px solid var(--border2);border-radius:8px;padding:12px 14px;margin-bottom:10px}
.note-text{font-size:16px;color:var(--text2);line-height:1.6}
.note-date{font-size:12px;color:var(--text3);margin-top:5px}
.hist-entry{background:var(--bg4);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:11px 15px;margin-bottom:10px}
.hist-field{font-size:14px;font-weight:700;color:var(--accent2)}
.hist-old{font-size:14px;color:var(--red);text-decoration:line-through;margin-top:4px;word-break:break-word}
.hist-new{font-size:14px;color:var(--green);margin-top:2px;word-break:break-word}
.hist-date{font-size:12px;color:var(--text3);margin-top:5px}
.doc-tabs-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.dtab{font-size:13px;padding:6px 13px;border-radius:6px;border:1px solid var(--border2);background:var(--bg4);color:var(--text2);cursor:pointer;font-family:inherit}
.dtab:hover{border-color:var(--accent);color:var(--text)}
.dtab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.dtab-add{font-size:13px;padding:6px 12px;border-radius:6px;border:1px dashed var(--border2);background:transparent;color:var(--text3);cursor:pointer;font-family:inherit}
.dtab-add:hover{border-color:var(--accent2);color:var(--accent2)}
.doc-file{display:flex;align-items:center;gap:12px;background:var(--bg4);border:1px solid var(--border2);border-radius:8px;padding:11px 14px;margin-bottom:8px}
.doc-file-name{font-size:15px;flex:1;font-weight:700;color:var(--text)}
.doc-file-date{font-size:12px;color:var(--text3)}
.doc-upload{border:2px dashed var(--border2);border-radius:10px;padding:28px;text-align:center;cursor:pointer;margin-top:12px}
.doc-upload:hover{border-color:var(--accent2)}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:13px}
.card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:15px;cursor:pointer;transition:border-color .15s}
.card:hover{border-color:var(--accent);background:var(--bg4)}
.card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.card-name{font-size:16px;font-weight:700;color:var(--accent2)}
.card-num{font-size:11px;color:var(--text3);background:var(--bg);padding:2px 7px;border-radius:4px}
.card-auth{font-size:13px;color:var(--text2);margin-top:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-grp{font-size:12px;color:var(--text3);margin-top:2px}
.pot-row{display:flex;align-items:center;gap:8px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.pot-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent3);cursor:pointer}
.pot-row label{font-size:13px;color:var(--accent3);cursor:pointer;font-weight:700}
.sc-head{display:flex;align-items:center;justify-content:space-between;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:15px 18px;cursor:pointer;margin-bottom:2px}
.sc-head:hover{background:var(--bg4)}
.sc-title{font-size:17px;font-weight:700}
.sc-body{background:var(--bg3);border:1px solid var(--border);border-top:none;border-radius:0 0 10px 10px;padding:14px;margin-bottom:10px;display:flex;flex-wrap:wrap;gap:8px}
.mcards{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-bottom:22px}
.mc{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center}
.mc-num{font-size:36px;font-weight:700}
.mc-lbl{font-size:14px;color:var(--text2);margin-top:5px}
.hm-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.hm-lbl{font-size:14px;width:200px;color:var(--text2);text-align:right;flex-shrink:0}
.hm-pill{height:28px;border-radius:5px;display:flex;align-items:center;padding:0 12px;font-size:14px;font-weight:700;white-space:nowrap;cursor:pointer}
.hm-pill:hover{opacity:.75}
.ptbl{width:100%;border-collapse:collapse;font-size:15px}
.ptbl th{text-align:left;padding:10px 12px;color:var(--text3);font-weight:700;border-bottom:1px solid var(--border);font-size:13px;text-transform:uppercase}
.ptbl td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:top}
.ptbl td:first-child{color:var(--text);font-weight:700}
.ptbl tr:hover td{background:var(--bg3);cursor:pointer}
.prow{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px;display:grid;grid-template-columns:140px 1fr 1fr 120px;gap:14px;margin-bottom:10px;cursor:pointer}
.prow:hover{border-color:var(--accent)}
.plbl{font-size:12px;color:var(--text3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em}
.eu-y{color:var(--green);font-size:14px}.eu-n{color:var(--yellow);font-size:14px}.eu-p{color:var(--accent2);font-size:14px}
.vgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.vc{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px}
.vc-name{font-size:16px;font-weight:700;color:var(--accent2);margin-bottom:6px}
.vc-c{font-size:14px;color:var(--text2);line-height:1.5}
.vc-ct{font-size:13px;color:var(--text3);margin-top:7px}
.cmp-col{background:var(--bg3);border:1px solid var(--border);border-radius:12px;overflow:hidden;min-width:240px}
.cmp-head{background:var(--bg4);padding:13px 16px;border-bottom:1px solid var(--border)}
.cmp-row{padding:9px 14px;border-bottom:1px solid var(--border);font-size:14px;display:flex;gap:10px}
.cmp-row:last-child{border-bottom:none}
.cmp-l{color:var(--text3);font-size:13px;font-weight:700;min-width:130px;text-transform:uppercase;letter-spacing:.04em}
.cmp-v{color:var(--text2);flex:1;line-height:1.5}
.cover{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 130px);text-align:center;gap:20px}
.c-title{font-size:46px;font-weight:700;line-height:1.2;max-width:800px;color:var(--text)}
.c-title span{color:var(--accent)}
.c-sub{font-size:19px;color:var(--text2);max-width:640px;line-height:1.6}
.st-row{display:flex;gap:44px;flex-wrap:wrap;justify-content:center;margin-top:16px}
.st-num{font-size:42px;font-weight:700;color:var(--accent)}
.st-lbl{font-size:14px;color:var(--text3);margin-top:3px}
.dh{width:80px;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px}
.cbadge{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent2);border:1px solid var(--accent2);padding:5px 16px;border-radius:20px}
.tag{font-size:14px;padding:5px 12px;border-radius:6px;background:var(--bg4);border:1px solid var(--border2);color:var(--text2);cursor:pointer;display:inline-block}
.tag:hover{border-color:var(--accent);color:var(--text)}
input[type=text],select,textarea{color:var(--text);background:var(--bg3);border:1px solid var(--border2);border-radius:8px;font-family:inherit;font-size:15px}
input[type=text]{padding:8px 12px}
select{padding:8px 12px}
input[type=text]:focus,select:focus{outline:none;border-color:var(--accent)}
.tb-btn{font-size:13px;padding:5px 12px;border-radius:6px;background:transparent;cursor:pointer;font-family:inherit;white-space:nowrap}
/* sync indicator */
#syncDot{width:10px;height:10px;border-radius:50%;background:var(--green);flex-shrink:0;transition:background .3s}
#syncDot.syncing{background:var(--yellow)}
#syncDot.error{background:var(--red)}
/* loading overlay */
#loadingOverlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px}
.spinner{width:40px;height:40px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="loadingOverlay">
  <div class="spinner"></div>
  <div style="color:var(--text2);font-size:16px">Connecting to database…</div>
</div>

<div class="app" style="display:none" id="mainApp">
  <div class="topbar">
    <span class="topbar-title">EU Customs Intelligence</span>
    <div class="sw">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8aa0b8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="gSrch" placeholder="Search countries…" oninput="onGS(this.value)" onblur="setTimeout(closeGS,200)" onkeydown="gsKey(event)">
    </div>
    <div id="gsrP" style="display:none"></div>
    <div id="syncDot" title="Database sync status"></div>
    <span id="syncLbl" style="font-size:12px;color:var(--text3)">Live</span>
    <span style="font-size:14px;color:var(--text3);margin-left:4px">44 countries · May 2026</span>
    <button id="saveDataBtn" class="tb-btn" style="display:none;border:1px solid var(--green);color:var(--green);margin-left:4px" onclick="exportData()" title="Download backup JSON">💾 Save data</button>
    <label id="restoreDataBtn" class="tb-btn" style="display:none;border:1px solid var(--accent2);color:var(--accent2);display:none;align-items:center" title="Restore from backup JSON">📂 Restore<input type="file" accept=".json" style="display:none" onchange="importData(this)"></label>
    <button id="changePwdBtn" class="tb-btn" style="display:none;border:1px solid var(--yellow);color:var(--yellow)" onclick="showChangePwd()">🔑 Change password</button>
    <span id="userBadge" style="font-size:13px;padding:5px 12px;border-radius:6px;background:var(--bg4);border:1px solid var(--border2);color:var(--accent2);font-weight:700"></span>
    <button id="signOutBtn" class="tb-btn" style="display:none;border:1px solid var(--red);color:var(--red)" onclick="doLogout()">Sign out</button>
  </div>
  <div class="nav" id="nav"></div>
  <div class="slide" id="slide"></div>
</div>

<script>
// ── FIREBASE ─────────────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyCYcQU46drTyNU8lour_GFtK7zaRj-8MU0",
  authDomain: "ultra-eu.firebaseapp.com",
  projectId: "ultra-eu",
  storageBucket: "ultra-eu.firebasestorage.app",
  messagingSenderId: "975932460888",
  appId: "1:975932460888:web:91951f4b568c5c84addf2d"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();

// Sync indicator helpers
function setSyncing() { var d=document.getElementById('syncDot'); if(d){d.className='syncing';} var l=document.getElementById('syncLbl'); if(l)l.textContent='Saving…'; }
function setSynced() { var d=document.getElementById('syncDot'); if(d){d.className='';} var l=document.getElementById('syncLbl'); if(l)l.textContent='Live'; }
function setSyncErr() { var d=document.getElementById('syncDot'); if(d){d.className='error';} var l=document.getElementById('syncLbl'); if(l)l.textContent='Offline'; }

// ── STATE — now backed by Firestore ──────────────────────────────────────────
var ST = {};          // local cache — mirrored from Firestore
var unsubListeners = {}; // per-country Firestore listeners
var useLocalStorage = false; // fallback when Firebase unavailable

// ── LOCALSTORAGE HELPERS ──────────────────────────────────────────────────────
function lsKey(id){ return 'eu_customs_country_'+id; }
function lsSave(id){
  try{ localStorage.setItem(lsKey(id), JSON.stringify(ST[id]||{})); }catch(e){}
}
function lsLoad(id){
  try{
    var raw=localStorage.getItem(lsKey(id));
    if(raw){ ST[id]=JSON.parse(raw); return true; }
  }catch(e){}
  return false;
}
function lsLoadAll(){
  try{
    Object.keys(localStorage).forEach(function(k){
      if(k.startsWith('eu_customs_country_')){
        var id=parseInt(k.replace('eu_customs_country_',''));
        if(!isNaN(id)){
          try{ ST[id]=JSON.parse(localStorage.getItem(k)); }catch(e){}
        }
      }
    });
  }catch(e){}
}

// Load a country doc from Firestore and keep it live
function listenCountry(id) {
  if (unsubListeners[id]) return; // already listening
  if(useLocalStorage){ lsLoad(id); return; }
  var ref = db.collection('countries').doc(String(id));
  var unsub = ref.onSnapshot(function(snap) {
    if (snap.exists) {
      ST[id] = snap.data();
      lsSave(id); // mirror to localStorage
    }
    // re-render if we're currently viewing this country
    if (detail && detail.id === id) renderSlide();
  }, function(err) { setSyncErr(); });
  unsubListeners[id] = unsub;
}

// Save a country state to Firestore + localStorage
var saveTimers = {};
function sanitizeForFirestore(obj){
  return JSON.parse(JSON.stringify(obj, function(k,v){
    return v===undefined ? null : v;
  }));
}

function save(id) {
  if (!id) return;
  lsSave(id); // always save to localStorage immediately
  if(useLocalStorage){ setSynced(); return; }
  setSyncing();
  clearTimeout(saveTimers[id]);
  saveTimers[id] = setTimeout(function() {
    var data = sanitizeForFirestore(ST[id] || {});
    db.collection('countries').doc(String(id)).set(data)
      .then(function(){ setSynced(); lsSave(id); })
      .catch(function(e) { console.error('Firestore save error:', e); setSyncErr(); lsSave(id); });
  }, 600); // debounce 600ms
}

function cst(id) {
  if (!ST[id]) ST[id] = {potential:false, notes:[], fields:{}, history:[], pipelineUpdates:[], docs:{General:[],Contracts:[],Reports:[],Correspondence:[]}, customTabs:[], activeDocTab:'General'};
  listenCountry(id);
  return ST[id];
}
function isPot(id) { return !!cst(id).potential; }
function getF(id, field) {
  var s = cst(id);
  return (s.fields && s.fields[field] !== undefined) ? s.fields[field] : BASE.filter(function(x){return x.id===id;})[0][field];
}
function setF(id, field, val) {
  var s = cst(id);
  var old = getF(id, field);
  if (old === val) return;
  s.history.unshift({field:field, old:old, nw:val, date:new Date().toLocaleString(), user:currentUser||'Unknown'});
  s.fields[field] = val;
  save(id);
}
function addNote(id, txt) { var s=cst(id); s.notes.push({text:txt, date:new Date().toLocaleString(), user:currentUser||'Unknown'}); save(id); }
function delNote(id, i) {
  var s=cst(id); var n=s.notes[i];
  s.history.unshift({field:'Note deleted', old:n.text, nw:'(deleted)', date:new Date().toLocaleString(), user:currentUser||'Unknown'});
  s.notes.splice(i,1); save(id);
}
function addPipeUpdate(id, txt) {
  var s=cst(id);
  s.pipelineUpdates.push({text:txt, date:new Date().toLocaleString(), user:currentUser||'Unknown'});
  s.history.unshift({field:'Pipeline update added', old:'', nw:txt, date:new Date().toLocaleString(), user:currentUser||'Unknown'});
  save(id);
}
function delPipeUpdate(id, i) {
  var s=cst(id); var u=s.pipelineUpdates[i];
  s.history.unshift({field:'Pipeline update deleted', old:u.text, nw:'(deleted)', date:new Date().toLocaleString(), user:currentUser||'Unknown'});
  s.pipelineUpdates.splice(i,1); save(id);
}
function latestPipe(id) { var pu=cst(id).pipelineUpdates; return (pu&&pu.length)?pu[pu.length-1].text:getF(id,'progress'); }

function addCustomTab(id, name) { var s=cst(id); s.customTabs.push({name:name, content:'', entries:[]}); save(id); }
function delCustomTab(id, name) { var s=cst(id); s.customTabs=s.customTabs.filter(function(t){return t.name!==name;}); save(id); }
function addCustomTabEntry(id, name, text) {
  var s=cst(id); var t=s.customTabs.filter(function(x){return x.name===name;})[0];
  if(!t)return; if(!t.entries)t.entries=[];
  t.entries.push({text:text, date:new Date().toLocaleString(), user:currentUser||'Unknown'});
  s.history.unshift({field:'Tab "'+name+'" — new entry', old:'', nw:text, date:new Date().toLocaleString(), user:currentUser||'Unknown'});
  save(id);
}
function delCustomTabEntry(id, name, i) {
  var s=cst(id); var t=s.customTabs.filter(function(x){return x.name===name;})[0];
  if(t&&t.entries){ var old=t.entries[i].text; s.history.unshift({field:'Tab "'+name+'" — entry deleted', old:old, nw:'(deleted)', date:new Date().toLocaleString(), user:currentUser||'Unknown'}); t.entries.splice(i,1); save(id); }
}
function addDoc(id, tab, name, dataUrl) { var s=cst(id); if(!s.docs[tab])s.docs[tab]=[]; s.docs[tab].push({name:name, dataUrl:dataUrl, date:new Date().toLocaleString()}); save(id); }
function delDoc(id, tab, i) { cst(id).docs[tab].splice(i,1); save(id); }
function dlDoc(dataUrl, name) { var a=document.createElement('a'); a.href=decodeURIComponent(dataUrl); a.download=name; document.body.appendChild(a); a.click(); document.body.removeChild(a); }
function handleUpload(id, input) {
  var tab=cst(id).activeDocTab||'General';
  Array.from(input.files).forEach(function(f) {
    var r=new FileReader();
    r.onload=function(e){addDoc(id,tab,f.name,encodeURIComponent(e.target.result));renderSlide();};
    r.readAsDataURL(f);
  });
  input.value='';
}

// ── BACKUP / RESTORE ─────────────────────────────────────────────────────────
function exportData() {
  var payload={version:2, savedAt:new Date().toLocaleString(), savedBy:currentUser||'Unknown', data:ST};
  var blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a'); a.href=url; a.download='eu_customs_backup_'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
}
function importData(input) {
  var file=input.files[0]; if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var payload=JSON.parse(e.target.result);
      var data=payload.data||payload;
      // Write all country docs to Firestore
      var batch=db.batch();
      Object.keys(data).forEach(function(id){
        batch.set(db.collection('countries').doc(String(id)), data[id]);
      });
      batch.commit().then(function(){
        alert('Data restored! Saved by: '+(payload.savedBy||'Unknown')+'\nDate: '+(payload.savedAt||'Unknown'));
      }).catch(function(e){alert('Error writing to database: '+e.message);});
    }catch(err){alert('Error loading file.');}
  };
  reader.readAsText(file);
  input.value='';
}

// ── UNDO ─────────────────────────────────────────────────────────────────────
function undoHistoryEntry(countryId, histIdx) {
  var s=cst(countryId); var entry=s.history[histIdx]; if(!entry)return;
  var revertableFields=['authority','head','ministry','minister','budget','relations','vendors','procurement','progress'];
  if(revertableFields.indexOf(entry.field)>=0){
    var prev=entry.old||'';
    s.history.unshift({field:entry.field, old:getF(countryId,entry.field), nw:prev, date:new Date().toLocaleString(), user:currentUser+' (undo)'});
    s.fields[entry.field]=prev; save(countryId); renderSlide();
  } else { alert('This type of change cannot be automatically reverted.'); }
}

var VENDORS={};
BASE.forEach(function(c){
  var re=/(Windward Ltd|Check Point Software|Cellebrite|NICE Ltd|Nice Systems|Elbit Systems|Rafael Advanced|Verint Systems|NSO Group|Amdocs|Allot Communications|CyberArk|ICTS Europe|Radcom|Nice Actimize)/g;
  var m;
  while((m=re.exec(c.vendors))!==null){
    var v=m[1].replace('Nice Systems','NICE Ltd').replace('Nice Actimize','NICE Ltd');
    if(!VENDORS[v])VENDORS[v]={name:v,countries:[]};
    if(VENDORS[v].countries.indexOf(c.name)<0)VENDORS[v].countries.push(c.name);
  }
});

function renderNav(){
  var h='';
  SLIDES.forEach(function(s){h+='<button class="nb'+(s.pot?' pot':'')+(cur===s.id?' active':'')+'" onclick="go(\''+s.id+'\')">'+s.label+'</button>';});
  document.getElementById('nav').innerHTML=h;
}
function go(id){cur=id;detail=null;sv='';fg='All';fr='All';activeDetailTab='overview';renderNav();renderSlide();}
function goDetail(id){
  var found=null;
  for(var i=0;i<BASE.length;i++){if(BASE[i].id===id){found=BASE[i];break;}}
  if(!found)return;
  detail=found;cur='countries';activeDetailTab='overview';
  // start live listener for this country
  listenCountry(id);
  renderNav();renderSlide();
  var sl=document.getElementById('slide');if(sl)sl.scrollTop=0;
  // Auto-fill fiscal year from ISO table if not set
  setTimeout(function(){autoFillFiscalYear(id);},500);
  // Auto-check news refresh (>24h)
  setTimeout(function(){checkNewsAutoRefresh(id);},1200);
  // Auto-check trade data refresh (>7 days)
  setTimeout(function(){checkTradeAutoRefresh(id);},1500);
}
function setDTab(t){activeDetailTab=t;renderSlide();}
function renderSlide(){
  var el=document.getElementById('slide');
  if(detail){el.innerHTML=renderDetail(detail);return;}
  var map={cover:rCover,summary:rSummary,heatmap:rHeatmap,countries:rCountries,pipeline:rPipeline,potential:rPotential,compare:rCompare,schema:rSchema,vendors:rVendors,procurement:rProcurement};
  el.innerHTML=(map[cur]||rCover)();
}

// ── GLOBAL SEARCH ─────────────────────────────────────────────────────────────
var gsResults=[],gsHi=-1;
function onGS(val){
  gsHi=-1;var p=document.getElementById('gsrP');
  if(!val.trim()){p.style.display='none';return;}
  var q=val.toLowerCase();
  gsResults=BASE.filter(function(c){return c.name.toLowerCase().indexOf(q)>=0||c.authority.toLowerCase().indexOf(q)>=0||c.head.toLowerCase().indexOf(q)>=0||c.minister.toLowerCase().indexOf(q)>=0;}).slice(0,8);
  if(!gsResults.length){p.style.display='none';return;}
  p.style.display='block';renderGSR();
}
function renderGSR(){
  var p=document.getElementById('gsrP');var h='';
  gsResults.forEach(function(c,i){
    h+='<div class="gsr-item'+(i===gsHi?' gsr-hi':'')+'" onmousedown="gsClick('+c.id+')">';
    h+='<div style="font-weight:700">'+c.name+' <span class="rb r'+c.rel[0].toLowerCase()+'">'+c.rel+'</span></div>';
    h+='<div class="gsr-sub">'+c.authority+'</div></div>';
  });
  p.innerHTML=h;
}
function gsKey(e){
  if(!gsResults.length)return;
  if(e.key==='ArrowDown'){e.preventDefault();gsHi=Math.min(gsHi+1,gsResults.length-1);renderGSR();}
  else if(e.key==='ArrowUp'){e.preventDefault();gsHi=Math.max(gsHi-1,-1);renderGSR();}
  else if(e.key==='Enter'&&gsHi>=0){e.preventDefault();gsClick(gsResults[gsHi].id);}
  else if(e.key==='Escape'){closeGS();}
}
function closeGS(){document.getElementById('gsrP').style.display='none';}
function gsClick(id){document.getElementById('gSrch').value='';closeGS();goDetail(id);}

    +'<div><div class="st-num" style="color:var(--red)">'+BASE.filter(function(c){return c.rel==='Hostile';}).length+'</div><div class="st-lbl">Hostile</div></div>'
    +'<div><div class="st-num" style="color:var(--yellow)">'+BASE.filter(function(c){return c.progressStatus==='active';}).length+'</div><div class="st-lbl">Active</div></div>'

// ── PROC FLOW ─────────────────────────────────────────────────────────────────
function mkProcFlow(id){
  var c=BASE.filter(function(x){return x.id===id;})[0];
  var budget=getF(id,'budget');var proc=getF(id,'procurement');
  var steps=[];
  steps.push({n:1,t:'Need identified',d:'Customs authority identifies IT/AI procurement requirement',col:'#3b82f6'});
  steps.push({n:2,t:'Budget source',d:budget,col:'#f59e0b'});
  if(c.euProcurement==='Yes'){
    steps.push({n:3,t:'Ministry of Finance approval',d:'Ministry allocates budget and approves procurement intent',col:'#8b5cf6'});
    steps.push({n:4,t:'Technical specs & DPIA',d:'IT team drafts requirements; Data Protection Impact Assessment mandatory for AI under GDPR',col:'#06b6d4'});
    steps.push({n:5,t:'EU threshold check (€135K)',d:'Above threshold → mandatory open EU tender on TED (Tenders Electronic Daily)',col:'#f97316'});
    steps.push({n:6,t:'TED publication',d:proc.split('.')[0]+'.',col:'#3b82f6'});
    steps.push({n:7,t:'Evaluation & award',d:'30–52 days for submissions. Technical + financial evaluation.',col:'#22c55e'});
    steps.push({n:8,t:'Framework agreement',d:'Typically 4-year framework. Implementation 4–18 months.',col:'#22c55e'});
  }else if(c.euProcurement==='Partial'){
    steps.push({n:3,t:'National authority approval',d:'Relevant ministry approves procurement budget',col:'#8b5cf6'});
    steps.push({n:4,t:'EEA-equivalent threshold check',d:'Follows EU-equivalent rules via EEA membership',col:'#f97316'});
    steps.push({n:5,t:'National e-procurement publication',d:proc.split('.')[0]+'.',col:'#3b82f6'});
    steps.push({n:6,t:'Contract award',d:'Framework agreement signed',col:'#22c55e'});
  }else{
    steps.push({n:3,t:'Government approval',d:'National treasury or ministry approves budget',col:'#8b5cf6'});
    steps.push({n:4,t:'National procurement law',d:proc.split('.')[0]+'.',col:'#3b82f6'});
    steps.push({n:5,t:'Direct negotiation or open tender',d:'Government-to-government deals possible. Often shorter cycle (3–6 months).',col:'#f97316'});
    steps.push({n:6,t:'Contract award',d:'Agreement signed per national rules',col:'#22c55e'});
  }
  var h='<div style="margin-top:14px;font-size:14px;color:var(--text3);margin-bottom:14px;text-transform:uppercase;letter-spacing:.07em;font-weight:700">Flow — '+(c.euProcurement==='Yes'?'Full EU rules':c.euProcurement==='Partial'?'EEA-equivalent':'National rules only')+'</div>';
  steps.forEach(function(step,i){
    h+='<div style="display:flex;align-items:flex-start;gap:12px">'
      +'<div style="display:flex;flex-direction:column;align-items:center;flex-shrink:0">'
      +'<div style="background:'+step.col+';color:#fff;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700">'+step.n+'</div>'
      +(i<steps.length-1?'<div style="width:2px;background:var(--border2);flex:1;min-height:14px;margin:3px 0"></div>':'')
      +'</div>'
      +'<div style="padding-bottom:'+(i<steps.length-1?12:0)+'px;flex:1">'
      +'<div style="font-size:15px;font-weight:700;color:var(--text)">'+step.t+'</div>'
      +'<div style="font-size:14px;color:var(--text2);margin-top:2px;line-height:1.5">'+step.d+'</div>'
      +'</div></div>';
  });
  return h;
}

// ── NEWS HELPERS ──────────────────────────────────────────────────────────────
function addUserNews(id){
  var title=document.getElementById('newsTitle'+id);
  var url=document.getElementById('newsUrl'+id);
  var src=document.getElementById('newsSrc'+id);
  var date=document.getElementById('newsDate'+id);
  if(!title||!title.value.trim())return;
  var s=cst(id);
  if(!s.userNews)s.userNews=[];
  s.userNews.push({title:title.value.trim(),url:url?url.value.trim():'#',src:src?src.value.trim():'',date:date?date.value.trim():new Date().toLocaleDateString()});
  save(id);renderSlide();
}
function delUserNews(id,i){
  var s=cst(id);if(s.userNews)s.userNews.splice(i,1);save(id);renderSlide();
}

// ── AUTO-ADD TO CAPTURE PLAN FROM AUTHORITY ───────────────────────────────────
function autoAddToCaptureFromAuthority(cid){
  var c=BASE.filter(function(x){return x.id===cid;})[0];
  var s=cst(cid);
  if(!s.capturePlan)s.capturePlan=[];
  var existing=s.capturePlan.map(function(p){return(p.name||'').toLowerCase();});
  var added=0;
  
  // Parse head field - may contain multiple people (split by " / ")
  var headStr=getF(cid,'head')||'';
  var headPeople=headStr.split(' / ');
  headPeople.forEach(function(personStr){
    var nameMatch=personStr.match(/^([^(]+)/);
    var titleMatch=personStr.match(/\(([^)]+)\)/);
    var name=(nameMatch?nameMatch[1].trim():'');
    var title=(titleMatch?titleMatch[1].trim():personStr.trim());
    if(name&&name.length>2&&!existing.includes(name.toLowerCase())){
      s.capturePlan.push({
        track:'Customer',
        name:name,
        phone:'',
        title:title,
        seniority:'Senior',
        type:'Technical',
        role:'Decision maker',
        attitude:'Unknown',
        agenda:'',
        inOfficeUntil:'',
        relevance:'Relevant',
        lastInteraction:'',
        nextStep:'',
        comments:'Auto-added from Authority & Leadership'
      });
      existing.push(name.toLowerCase());
      added++;
    }
  });
  
  // Parse minister field
  var minStr=getF(cid,'minister')||c.minister||'';
  var minPeople=minStr.split(' / ');
  minPeople.forEach(function(personStr){
    var nameMatch=personStr.match(/^([^(]+)/);
    var name=(nameMatch?nameMatch[1].trim():'');
    var minTitle=(c.ministry||'Minister responsible');
    if(name&&name.length>2&&name!=='Unknown'&&!existing.includes(name.toLowerCase())){
      s.capturePlan.push({
        track:'Money',
        name:name,
        phone:'',
        title:'Minister — '+minTitle,
        seniority:'Senior',
        type:'Political',
        role:'Decision maker',
        attitude:'Unknown',
        agenda:'',
        inOfficeUntil:'',
        relevance:'Relevant',
        lastInteraction:'',
        nextStep:'',
        comments:'Auto-added from Authority & Leadership'
      });
      existing.push(name.toLowerCase());
      added++;
    }
  });
  
  if(added>0){save(cid);}
  return added;
}

// ── GOOGLE NEWS RSS (עובד דרך hidden iframe) ─────────────────────────────────
// גישה: פותחים iframe מוסתר, קוראים את ה-RSS, מחלצים כתבות
function fetchGoogleNews(cid){
  var c=BASE.filter(function(x){return x.id===cid;})[0];
  var s=cst(cid);
  var defaultKw=[c.name+' customs',c.name+' revenue authority'];
  if(getF(cid,'head'))defaultKw.push(getF(cid,'head').split('(')[0].trim());
  if(getF(cid,'minister'))defaultKw.push(getF(cid,'minister').split('(')[0].trim());
  var kws=s.newsKeywords&&s.newsKeywords.length?s.newsKeywords:defaultKw;
  // Build smart query: country name + customs OR head name OR minister name
  var query=c.name+' customs';
  if(getF(cid,'head')){var hn=getF(cid,'head').split('(')[0].trim().split(' ').pop();if(hn.length>3)query+=' OR '+hn;}
  if(s.newsKeywords&&s.newsKeywords.length)query=kws.slice(0,3).join(' OR ');

  var btns=document.querySelectorAll('[onclick*="autoFetchNews('+cid+')"]');
  btns.forEach(function(b){b.disabled=true;b.textContent='🔄 Searching…';});

  // Try fetch with no-cors mode to get RSS — parse XML
  var rssUrl='https://news.google.com/rss/search?q='+encodeURIComponent(query)+'&hl=en-US&gl=US&ceid=US:en&num=20';
  
  fetch(rssUrl,{mode:'cors',headers:{'Accept':'application/rss+xml,application/xml,text/xml'}})
    .then(function(r){return r.text();})
    .then(function(xml){parseRSSAndSave(xml,cid,btns);})
    .catch(function(){
      // CORS blocked — try via fetch API with different approach
      fetch('https://news.google.com/rss/search?q='+encodeURIComponent(query)+'&hl=en')
        .then(function(r){return r.text();})
        .then(function(xml){parseRSSAndSave(xml,cid,btns);})
        .catch(function(){
          // Final fallback — show direct Google News link
          btns.forEach(function(b){b.disabled=false;b.textContent='🔍 Search Now';});
          showGoogleNewsFallback(cid,query);
        });
    });
}

function parseRSSAndSave(xml,cid,btns){
  var s=cst(cid);
  try{
    var parser=new DOMParser();
    var doc=parser.parseFromString(xml,'application/xml');
    var items=doc.querySelectorAll('item');
    if(!items||items.length===0)throw new Error('No items');
    var articles=[];
    items.forEach(function(item){
      var title=(item.querySelector('title')||{}).textContent||'';
      // Google News RSS puts link as text node after <link/> tag
      var linkEl=item.getElementsByTagName('link');
      var link='#';
      if(linkEl&&linkEl[0]){
        var next=linkEl[0].nextSibling;
        if(next&&next.nodeValue)link=next.nodeValue.trim();
      }
      if(link==='#'){
        var guidEl=item.querySelector('guid');
        if(guidEl)link=guidEl.textContent||'#';
      }
      var pubDate=(item.querySelector('pubDate')||{}).textContent||'';
      var source=(item.querySelector('source')||{}).textContent||'Google News';
      var desc=(item.querySelector('description')||{}).textContent||'';
      var cleanDesc=desc.replace(/<[^>]+>/g,'').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&').trim().substring(0,220);
      var cleanTitle=title.replace(/\s*-\s*[A-Z][a-zA-Z\s]+$/, '').trim();
      if(cleanTitle&&cleanTitle.length>8){
        var d=pubDate?new Date(pubDate):new Date();
        articles.push({
          title:cleanTitle,
          url:link,
          src:source,
          date:d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}),
          summary:cleanDesc,
          fetchedAt:new Date().toISOString()
        });
      }
    });
    if(articles.length){
      var existing=(s.autoNews||[]).map(function(a){return a.title;});
      var newOnes=articles.filter(function(a){return!existing.includes(a.title);});
      s.autoNews=(s.autoNews||[]).concat(newOnes);
      s.lastNewsFetch=new Date().toLocaleString();
      save(cid);
      if(btns)btns.forEach(function(b){b.disabled=false;b.textContent='🔍 Search Now';});
      renderSlide();
    } else {
      throw new Error('No valid articles parsed');
    }
  }catch(e){
    if(btns)btns.forEach(function(b){b.disabled=false;b.textContent='🔍 Search Now';});
    var c2=BASE.filter(function(x){return x.id===cid;})[0];
    showGoogleNewsFallback(cid,(c2?c2.name:'')+ ' customs');
  }
}

  // Show direct clickable link as fallback
  var el=document.getElementById('newsGoogleFallback_'+cid);
  if(el){
    el.style.display='block';
    el.innerHTML='<div style="padding:12px 16px;background:var(--bg4);border:1px solid var(--accent2);border-radius:8px">'

// ── TENURE WARNING HELPER ────────────────────────────────────────────────────
function parseTenureMonths(tenureStr){
  if(!tenureStr)return null;
  var months=['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  var lower=tenureStr.toLowerCase().trim();
  var year=null,month=0;
  var yMatch=lower.match(/\b(20\d\d)\b/);
  if(yMatch)year=parseInt(yMatch[1]);
  for(var i=0;i<months.length;i++){if(lower.indexOf(months[i])>=0){month=i;break;}}
  if(!year)return null;
  return new Date(year,month,1);
}
function tenureWarning(tenureStr,role){
  var d=parseTenureMonths(tenureStr);
  if(!d)return '';
  var now=new Date();
  var years=((now-d)/(1000*60*60*24*365));
  var html='<span style="font-size:12px;color:var(--text3);margin-left:8px">Since: '+tenureStr;
  if(years>=4){
    html+='<span style="margin-left:6px;background:#450a0a;color:#fca5a5;border-radius:4px;padding:1px 7px;font-size:11px;font-weight:700">⚠ '+years.toFixed(1)+'y — change likely soon</span>';
  } else if(years>=3){
    html+='<span style="margin-left:6px;background:#1c1917;color:#fde68a;border-radius:4px;padding:1px 7px;font-size:11px;font-weight:700">'+years.toFixed(1)+'y tenure</span>';
  } else {
    html+='<span style="margin-left:6px;background:var(--bg4);color:var(--text3);border-radius:4px;padding:1px 7px;font-size:11px">'+years.toFixed(1)+'y tenure</span>';
  }
  html+='</span>';
  return html;
}

// Rich tenure display for overview tab
function richTenure(cid, role){
  var db=TENURE_DB[cid];
  if(!db)return'';
  var t=db[role];
  if(!t||!t.since)return'';
  var since=parseTenureMonths(t.since);
  if(!since)return'<span style="font-size:12px;color:var(--text3);margin-left:8px">Since: '+t.since+'</span>';
  var now=new Date();
  var months=Math.round((now-since)/(1000*60*60*24*30.44));
  var years=(months/12);
  var dur=years>=1?(years>=2?Math.floor(years)+' years':Math.floor(months/12)+' yr '+Math.round(months%12)+' mo'):months+' months';
  // Expected end: typical EU customs term is 5 years
  var expectedEnd=new Date(since);expectedEnd.setFullYear(expectedEnd.getFullYear()+5);
  var monthsLeft=Math.round((expectedEnd-now)/(1000*60*60*24*30.44));
  var urgency=months>=54?'var(--red)':months>=42?'var(--yellow)':'var(--text3)';
  var html='<div style="display:inline-flex;flex-wrap:wrap;gap:5px;margin-left:8px;vertical-align:middle">'
    +'<span style="background:var(--bg4);border:1px solid var(--border2);border-radius:12px;padding:2px 9px;font-size:12px;color:var(--text2)">Since '+t.since+'</span>'
    +'<span style="background:var(--bg4);border:1px solid var(--border2);border-radius:12px;padding:2px 9px;font-size:12px;color:'+urgency+'">'+dur+' in office</span>';
  if(t.until){
    html+='<span style="background:#450a0a;border:1px solid #7f1d1d;border-radius:12px;padding:2px 9px;font-size:12px;color:#fca5a5">Ended: '+t.until+'</span>';
  } else if(months>=54){
    html+='<span style="background:#450a0a;border:1px solid #7f1d1d;border-radius:12px;padding:2px 9px;font-size:12px;color:#fca5a5">⚠ Change likely soon</span>';
  } else if(monthsLeft>0&&monthsLeft<=18){
    html+='<span style="background:#1c1917;border:1px solid #44403c;border-radius:12px;padding:2px 9px;font-size:12px;color:#fde68a">~'+monthsLeft+'mo left in term</span>';
  }
  if(t.note)html+='<span style="background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:2px 9px;font-size:12px;color:var(--text3)">'+t.note+'</span>';
  html+='</div>';
  return html;
}

// ── LIVE TRADE DATA (UN Comtrade + World Bank APIs) ───────────────────────────
// Comtrade free API: https://comtradeapi.un.org/public/v1/preview/C/A/HS
// World Bank API: https://api.worldbank.org/v2/country/{iso}/indicator/{id}

function fetchLiveTradeData(cid){
  var c=BASE.filter(function(x){return x.id===cid;})[0];
  var iso=COUNTRY_ISO[cid];
  if(!iso){alert('No ISO data for '+c.name);return;}
  var con=document.getElementById('tradeDataContainer_'+cid);
  if(!con)return;
  con.innerHTML='<div style="padding:32px;text-align:center"><div class="spinner" style="margin:0 auto 16px;width:32px;height:32px;border-width:3px"></div>'
    +'<div style="color:var(--text2);font-size:15px">Fetching live data from World Bank + UN Comtrade APIs…</div>'
    +'<div style="color:var(--text3);font-size:13px;margin-top:8px">This may take 5–10 seconds</div></div>';

  var wb=iso.wb;
  // World Bank indicators we need
  var indicators={
    gdp:'NY.GDP.MKTP.CD',        // GDP current USD
    gdpPc:'NY.GDP.PCAP.CD',      // GDP per capita
    imports:'NE.IMP.GNFS.CD',    // Imports of goods and services
    exports:'NE.EXP.GNFS.CD',    // Exports of goods and services
    tradeGdp:'NE.TRD.GNFS.ZS',   // Trade % of GDP
    pop:'SP.POP.TOTL'            // Population
  };

  var wbBase='https://api.worldbank.org/v2/country/'+wb+'/indicator/';
  var wbSuffix='?format=json&mrv=3&per_page=3';

  // Fetch all WB indicators in parallel
  var wbPromises=Object.keys(indicators).map(function(k){
    return fetch(wbBase+indicators[k]+wbSuffix)
      .then(function(r){return r.json();})
      .then(function(d){
        var val=null,year=null;
        if(d&&d[1]&&d[1].length){
          for(var i=0;i<d[1].length;i++){
            if(d[1][i].value!==null){val=d[1][i].value;year=d[1][i].date;break;}
          }
        }
        return{key:k,value:val,year:year};
      }).catch(function(){return{key:k,value:null,year:null};});
  });

  // Also fetch Comtrade data via preview endpoint (no key needed, limited)
  // Use reporter code from m49
  var comtradeUrl='https://comtradeapi.un.org/public/v1/preview/C/A/HS?reporterCode='+iso.m49+'&flowCode=M&period=2023,2022&cmdCode=TOTAL&partnerCode=0&motCode=0&customsCode=C00&partner2Code=0';

  var comtradePromise=fetch(comtradeUrl)
    .then(function(r){return r.json();})
    .then(function(d){return d;})
    .catch(function(){return null;});

  Promise.all(wbPromises.concat([comtradePromise])).then(function(results){
    var wbData={};
    results.slice(0,-1).forEach(function(r){wbData[r.key]=r;});
    var comtrade=results[results.length-1];

    // Parse World Bank data
    function fmt(v,decimals){
      if(v===null||v===undefined)return null;
      if(Math.abs(v)>=1e12)return '$'+(v/1e12).toFixed(decimals||1)+'T';
      if(Math.abs(v)>=1e9)return '$'+(v/1e9).toFixed(decimals||1)+'B';
      if(Math.abs(v)>=1e6)return '$'+(v/1e6).toFixed(decimals||1)+'M';
      return '$'+v.toFixed(0);
    }
    function fmtNum(v){
      if(v===null)return null;
      if(v>=1e9)return (v/1e9).toFixed(1)+'B';
      if(v>=1e6)return (v/1e6).toFixed(1)+'M';
      return v.toFixed(0);
    }

    var gdp=wbData.gdp;var gdpPc=wbData.gdpPc;
    var imp=wbData.imports;var exp=wbData.exports;
    var trd=wbData.tradeGdp;var pop=wbData.pop;
    var dataYear=gdp&&gdp.year?gdp.year:(imp&&imp.year?imp.year:'2023');

    // Parse Comtrade for top partners
    var comtradePartners=[];
    if(comtrade&&comtrade.data&&comtrade.data.length){
      // Try to get partner breakdown
    }

    // Build the trade data object — start from TRADE_DB and ENRICH with live WB data
    // IMPORTANT: never overwrite product/partner breakdowns from TRADE_DB with WB aggregate data
    var base=TRADE_DB[cid]?Object.assign({},TRADE_DB[cid]):{};

    // Only update macro fields from WB if we have valid data
    if(gdp&&gdp.value)base.gdp=fmt(gdp.value,2);
    if(gdpPc&&gdpPc.value)base.gdpPerCapita=fmt(gdpPc.value,0);
    if(pop&&pop.value)base.population=fmtNum(pop.value);
    if(trd&&trd.value)base.gdpShare=trd.value.toFixed(0)+'% of GDP';

    // Only update totals from WB if TRADE_DB doesn't have them
    // Note: WB "imports" = goods+services, so we prefer TRADE_DB's goods-only figures
    if(!base.totalImports&&imp&&imp.value)base.totalImports=fmt(imp.value,1);
    if(!base.totalExports&&exp&&exp.value)base.totalExports=fmt(exp.value,1);
    if(!base.tradeBalance&&imp&&imp.value&&exp&&exp.value)
      base.tradeBalance=(exp.value-imp.value>=0?'+':'')+fmt(exp.value-imp.value,1);

    // Update year to most recent WB data year if newer
    var wbYear=gdp&&gdp.year?parseInt(gdp.year):0;
    var dbYear=base.year?parseInt(base.year):0;
    if(wbYear>dbYear)base.year=String(wbYear);

    // Enrich overview with live WB data
    if(!base.overview||base.overview.length<50){
      base.overview='In '+(base.year||dataYear)+', '+c.name+' had a GDP of '+(base.gdp||'—')
        +(base.gdpPerCapita?' and a GDP per capita of '+base.gdpPerCapita+'.':', per capita data not available.')
        +(base.totalImports?' Total imports: '+base.totalImports+'.':'')
        +(base.totalExports?' Total exports: '+base.totalExports+'.':'')
        +(base.gdpShare?' Trade represents '+base.gdpShare+'.':'');
    }

    base.source='UN Comtrade / Eurostat'+(gdp&&gdp.value?' + World Bank (GDP '+dataYear+')':'');
    base.liveData=true;

    var tradeObj=base;

    // If still no meaningful data, use pure TRADE_DB
    if(!tradeObj.totalImports&&!tradeObj.totalExports&&!tradeObj.overview){
      tradeObj=TRADE_DB[cid]||{overview:'No trade data available.',year:'2024'};
      tradeObj.liveData=false;
      tradeObj.source='Cached data';
    }

    var s=cst(cid);
    s.tradeData=tradeObj;
    s.tradeDataTs='Live — '+new Date().toLocaleString()+(tradeObj.liveData?' (World Bank '+dataYear+')':' (cached)');
    // also auto-fill fiscal year
    autoFillFiscalYear(cid);
    save(cid);
    con.innerHTML=renderTradeData(tradeObj,c);
    // update timestamp display
    var tsEl=con.parentElement&&con.parentElement.querySelector?con.parentElement.querySelector('[data-ts]'):null;
    if(tsEl)tsEl.textContent='Last updated: '+s.tradeDataTs;
  }).catch(function(err){
    con.innerHTML='<div style="color:var(--red);padding:24px;text-align:center">'
      +'<div style="font-size:16px;font-weight:700;margin-bottom:8px">⚠ API Fetch Error</div>'
      +'<div style="font-size:14px;color:var(--text2)">'+err.message+'</div>'
      +'<div style="margin-top:16px;font-size:14px;color:var(--text3)">Showing cached data instead:</div>'
      +'</div>'
      +(TRADE_DB[cid]?renderTradeData(TRADE_DB[cid],c):'');
  });
}

// Auto-fetch trade data on load if >7 days old or never fetched
function checkTradeAutoRefresh(cid){
  var s=cst(cid);
  if(!s.tradeDataTs)return; // never fetched — don't auto-fetch, let user click
  if(s.tradeDataTs.indexOf('cached')>=0)return; // already cached
  var match=s.tradeDataTs.match(/Live — (.+?) \(/);
  if(!match)return;
  try{
    var last=new Date(match[1]);
    var days=(new Date()-last)/(1000*60*60*24);
    if(days>=7)fetchLiveTradeData(cid);
  }catch(e){}
}

function fetchTradeData(cid){
  var c=BASE.filter(function(x){return x.id===cid;})[0];
  var con=document.getElementById('tradeDataContainer_'+cid);
  if(!con)return;
  var d=TRADE_DB[cid];
  if(d){
    con.innerHTML=renderTradeData(d,c);
  } else {
    var slug=c.name.toLowerCase().replace(/\s+/g,'-').replace(/[üü]/g,'u').replace(/ö/g,'o').replace(/ä/g,'a');
    con.innerHTML='<div style="text-align:center;padding:28px">'
      +'<p style="color:var(--text2);margin-bottom:14px;font-size:15px">Full trade profile not yet available for <strong>'+c.name+'</strong>.</p>'
      +'<a href="https://oec.world/en/profile/country/'+slug+'" target="_blank" style="color:var(--accent2);font-size:14px;padding:9px 20px;border:1px solid var(--accent2);border-radius:6px;text-decoration:none">Open OEC.world → '+c.name+' ↗</a>'
      +'</div>';
  }
}

function fmtDecl(n){if(!n&&n!==0)return'—';if(n>=1000000)return(n/1000000).toFixed(1)+'M';if(n>=1000)return(n/1000).toFixed(0)+'K';return n.toString();}

function renderTradeData(d,c){
  if(!d)return '';
  var oecLink='https://oec.world/en/profile/country/'+(d.isoSlug||c.name.toLowerCase().replace(/\s+/g,'-'));
  var teLink='https://tradingeconomics.com/'+c.name.toLowerCase().replace(/\s+/g,'-').replace(/ü/g,'u').replace(/ö/g,'o').replace(/ä/g,'a')+'/imports-by-country';
  var colors=['#3b82f6','#8b5cf6','#22c55e','#f59e0b','#06b6d4','#f97316','#ec4899','#14b8a6','#a855f7','#84cc16'];

  function parseVal(v){
    if(!v)return 0;
    var s=String(v).replace(/\$|,/g,'');
    if(s.indexOf('T')>=0)return parseFloat(s)*1e12;
    if(s.indexOf('B')>=0)return parseFloat(s)*1e9;
    if(s.indexOf('M')>=0)return parseFloat(s)*1e6;
    return parseFloat(s)||0;
  }

  function fmtShort(v){
    if(v>=1e12)return '$'+(v/1e12).toFixed(1)+'T';
    if(v>=1e9)return '$'+(v/1e9).toFixed(1)+'B';
    if(v>=1e6)return '$'+(v/1e6).toFixed(0)+'M';
    return '$'+v;
  }

  // ── SVG BAR CHART ────────────────────────────────────────────────────────────
  function svgBarChart(items,valueKey,labelKey,title,colorOffset){
    if(!items||!items.length)return '';
    colorOffset=colorOffset||0;
    var vals=items.slice(0,8).map(function(p){return parseVal(p[valueKey]||p.value||'0');});
    var maxV=Math.max.apply(null,vals)||1;
    var barH=28,gap=8,pad=16,labelW=150,chartW=320;
    var totalH=pad*2+items.slice(0,8).length*(barH+gap);
    var svgH=totalH;
    var svg='<svg viewBox="0 0 '+(labelW+chartW+pad*2)+' '+svgH+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-height:280px">';
    items.slice(0,8).forEach(function(p,i){
      var v=vals[i];
      var w=Math.max(4,Math.round((v/maxV)*chartW));
      var y=pad+i*(barH+gap);
      var col=colors[(i+colorOffset)%colors.length];
      var lbl=String(p[labelKey]||p.name||p.country||'').substring(0,20);
      svg+='<text x="'+(labelW-6)+'" y="'+(y+barH/2+5)+'" text-anchor="end" fill="var(--text2)" font-size="12" font-family="system-ui,sans-serif">'+lbl+'</text>';
      svg+='<rect x="'+labelW+'" y="'+y+'" width="'+w+'" height="'+barH+'" rx="4" fill="'+col+'" opacity="0.9"/>';
      svg+='<text x="'+(labelW+w+6)+'" y="'+(y+barH/2+5)+'" fill="'+col+'" font-size="12" font-weight="700" font-family="system-ui,sans-serif">'+(p.value||p.share||fmtShort(v))+'</text>';
    });
    svg+='</svg>';
    return '<div style="background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:14px">'
      +'<div style="font-size:13px;font-weight:800;color:var(--text);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px">'+title+'</div>'
      +svg+'</div>';
  }

  // ── SVG DONUT CHART ──────────────────────────────────────────────────────────
  function svgDonut(items,labelKey,title,colorOffset){
    if(!items||!items.length)return '';
    colorOffset=colorOffset||0;
    var vals=items.slice(0,7).map(function(p){
      var s=String(p.share||'0').replace('%','');return parseFloat(s)||0;
    });
    var total=vals.reduce(function(a,b){return a+b;},0)||100;
    var cx=90,cy=90,r=70,ir=42;
    var svg='<svg viewBox="0 0 220 180" xmlns="http://www.w3.org/2000/svg">';
    var startAngle=-Math.PI/2;
    vals.forEach(function(v,i){
      var angle=(v/total)*2*Math.PI;
      var endAngle=startAngle+angle;
      var x1=cx+r*Math.cos(startAngle),y1=cy+r*Math.sin(startAngle);
      var x2=cx+r*Math.cos(endAngle),y2=cy+r*Math.sin(endAngle);
      var xi1=cx+ir*Math.cos(startAngle),yi1=cy+ir*Math.sin(startAngle);
      var xi2=cx+ir*Math.cos(endAngle),yi2=cy+ir*Math.sin(endAngle);
      var lg=angle>Math.PI?1:0;

function exportPPTX(cid){

  var td=cst(cid).tradeData||TRADE_DB[cid]||null;
  var notes=s.notes||[];
  var prMap={active:'Active engagement',pending:'Pending',fallen:'Fallen through',none:'No activity'};
  var prC={active:'#22c55e',pending:'#f59e0b',fallen:'#ef4444',none:'#94a3b8'};
  var ps=c.progressStatus||'none';
  var lp=latestPipe(cid);
  var fy=getF(cid,'fiscalYear')||(COUNTRY_ISO[cid]&&COUNTRY_ISO[cid].fiscalYear)||'Jan–Dec';
  var ht=getF(cid,'headTenure')||'';
  var mt=getF(cid,'ministerTenure')||'';
  var iso=COUNTRY_ISO[cid]||{};

  function tx(str,n){return str?(str+'').substring(0,n||300):'';}
  function fmtBar(val,max){return Math.round(Math.min(100,(parseFloat(val)||0)/max*100));}

  // Build trade visuals
  var impProds=td&&td.imports&&td.imports.topProducts?td.imports.topProducts:[];
  var expProds=td&&td.exports&&td.exports.topProducts?td.exports.topProducts:[];
  var impOrig=td&&td.imports&&td.imports.topOrigins?td.imports.topOrigins:[];
  var expDest=td&&td.exports&&td.exports.topDestinations?td.exports.topDestinations:[];

  var colors=['#6366f1','#8b5cf6','#ec4899','#f59e0b','#22c55e','#06b6d4','#3b82f6','#f97316','#14b8a6','#a855f7'];

  function barRows(items,colorStart){
    if(!items||!items.length)return '<div style="color:#94a3b8;font-size:13px">No data</div>';

    +'.pp-card-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:#64748b;margin-bottom:5px}'
    +'.pp-card-val{font-size:14px;font-weight:700;color:#0f172a;line-height:1.4}'
    +'.ctrl{position:fixed;bottom:0;left:0;right:0;background:#0f172a;border-top:1px solid #1e3a5f;padding:10px 24px;display:flex;align-items:center;justify-content:space-between;z-index:100}'
    +'.cb{font-size:13px;padding:7px 18px;border-radius:6px;border:1px solid #2d4a6e;background:transparent;color:#b8c8dc;cursor:pointer;font-family:inherit}'
    +'.cb:hover{background:#1a2235;color:#e8edf5}.cb.pri{background:#8b5cf6;border-color:#8b5cf6;color:#fff}'
    +'</style></head><body>'
    +'<div id="pres">'+slides+'</div>'
    +'<div class="ctrl">'
    +'<button class="cb" onclick="prev()">← Previous</button>'
    +'<div id="info" style="font-size:13px;color:#475569">Slide 1 of '+(pots.length+1)+'</div>'
    +'<div style="display:flex;gap:8px"><button class="cb" onclick="window.print()">🖨 Export PDF</button><button class="cb pri" onclick="next()">Next →</button></div>'
    +'</div>'
    +'<script>var cur=0,sls=document.querySelectorAll(\'.pp-slide\'),tot=sls.length;'
    +'function show(n){sls.forEach(function(s){s.classList.remove(\'active\');});sls[n].classList.add(\'active\');document.getElementById(\'info\').textContent=\'Slide \'+(n+1)+\' of \'+tot;}'
    +'function next(){if(cur<tot-1){cur++;show(cur);}}'
    +'function prev(){if(cur>0){cur--;show(cur);}}'
    +'document.addEventListener(\'keydown\',function(e){if(e.key===\'ArrowRight\'||e.key===\'ArrowDown\')next();else if(e.key===\'ArrowLeft\'||e.key===\'ArrowUp\')prev();else if(e.key===\'f\'||e.key===\'F\')document.documentElement.requestFullscreen&&document.documentElement.requestFullscreen();});'
    +'show(0);<\/script></body></html>';
  var w=window.open('','_blank');w.document.write(html);w.document.close();
}

var ADMIN_USER='EYAL SHAULI';
var ADMIN_PWD='Owvmxd01';
var currentUser=null;

function getPassword(user){
  if(user===ADMIN_USER)return ADMIN_PWD;
  // Store general password in Firestore settings doc
  return db.collection('settings').doc('auth').get().then(function(snap){
    return(snap.exists&&snap.data().password)?snap.data().password:'1234';
  }).catch(function(){return'1234';});
}

function showLogin(msg){
  document.getElementById('nav').style.display='none';
  document.getElementById('slide').style.display='none';
  var app=document.querySelector('.app');
  var ex=document.getElementById('loginScreen');if(ex)ex.remove();
  var div=document.createElement('div');
  div.id='loginScreen';
  div.style.cssText='flex:1;display:flex;align-items:center;justify-content:center;background:var(--bg)';
  div.innerHTML='<div style="background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:40px 48px;max-width:420px;width:100%;text-align:center">'
    +'<div style="font-size:28px;margin-bottom:8px">🔐</div>'
    +'<h2 style="font-size:22px;font-weight:700;color:var(--accent2);margin-bottom:6px">EU Customs Intelligence</h2>'
    +'<p style="font-size:14px;color:var(--text3);margin-bottom:28px">Enter your full name and password to continue</p>'
    +(msg?'<div style="background:#450a0a;border:1px solid #7f1d1d;color:#fca5a5;border-radius:8px;padding:10px 14px;margin-bottom:18px;font-size:14px">'+msg+'</div>':'')
    +'<input type="text" id="loginName" placeholder="Full name (e.g. John Smith)" style="width:100%;margin-bottom:12px;padding:10px 14px;font-size:15px;border-radius:8px;border:1px solid var(--border2);background:var(--bg4);color:var(--text)">'
    +'<input type="password" id="loginPwd" placeholder="Password" style="width:100%;margin-bottom:20px;padding:10px 14px;font-size:15px;border-radius:8px;border:1px solid var(--border2);background:var(--bg4);color:var(--text)" onkeydown="if(event.key===\'Enter\')doLogin()">'
    +'<button onclick="doLogin()" style="width:100%;padding:11px;font-size:16px;font-weight:700;border-radius:8px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-family:inherit">Sign in</button>'
    +'</div>';
  app.appendChild(div);
}

function doLogin(){
  var name=(document.getElementById('loginName').value||'').trim().toUpperCase();
  var pwd=(document.getElementById('loginPwd').value||'').trim();
  if(!name){showLogin('Please enter your full name.');return;}

  if(name===ADMIN_USER){
    if(pwd!==ADMIN_PWD){showLogin('Incorrect password. Please try again.');return;}
    finishLogin(name);
  }else{
    // Check general password from Firestore
    db.collection('settings').doc('auth').get().then(function(snap){
      var correctPwd=(snap.exists&&snap.data().password)?snap.data().password:'1234';
      if(pwd!==correctPwd){showLogin('Incorrect password. Please try again.');return;}
      finishLogin(name);
    }).catch(function(){
      if(pwd!=='1234'){showLogin('Incorrect password. Please try again.');return;}
      finishLogin(name);
    });
  }
}

function finishLogin(name){
  currentUser=name;
  var ls=document.getElementById('loginScreen');if(ls)ls.remove();
  document.getElementById('nav').style.display='';
  document.getElementById('slide').style.display='';
  var ub=document.getElementById('userBadge');if(ub)ub.textContent=currentUser;
  var sob=document.getElementById('signOutBtn');if(sob)sob.style.display='';
  var cpb=document.getElementById('changePwdBtn');if(cpb&&currentUser===ADMIN_USER)cpb.style.display='';
  // Save/Restore only for EYAL SHAULI
  var sdb=document.getElementById('saveDataBtn');if(sdb&&currentUser===ADMIN_USER)sdb.style.display='';
  var rdb=document.getElementById('restoreDataBtn');if(rdb&&currentUser===ADMIN_USER){rdb.style.display='inline-flex';}
  renderNav();renderSlide();
}

function doLogout(){
  currentUser=null;
  var ub=document.getElementById('userBadge');if(ub)ub.textContent='';
  var sob=document.getElementById('signOutBtn');if(sob)sob.style.display='none';
  var cpb=document.getElementById('changePwdBtn');if(cpb)cpb.style.display='none';
  detail=null;cur='cover';showLogin();
}

function showChangePwd(){
  if(currentUser!==ADMIN_USER)return;
  var np=prompt('Enter new password for all users (min 4 characters):');
  if(!np||np.trim().length<4){alert('Password must be at least 4 characters.');return;}
  db.collection('settings').doc('auth').set({password:np.trim()}).then(function(){
    alert('Password changed successfully! All users will use the new password on next login.');
  }).catch(function(e){alert('Error saving password: '+e.message);});
}

// ── STARTUP — check Firestore connection, then show login ─────────────────────
function showApp(){
  document.getElementById('loadingOverlay').style.display='none';
  document.getElementById('mainApp').style.display='flex';
  showLogin();
}

// Timeout: if Firebase doesn't respond in 5 seconds, load anyway in offline mode
var startupTimer=setTimeout(function(){
  console.warn('Firebase timeout — switching to localStorage mode');
  useLocalStorage=true;
  lsLoadAll(); // load all saved data from localStorage
  setSyncErr();
  // Update sync label to show offline mode
  var l=document.getElementById('syncLbl');
  if(l)l.textContent='Local only';
  showApp();
}, 5000);

db.collection('settings').doc('auth').get()
  .then(function(){
    clearTimeout(startupTimer);
    useLocalStorage=false;
    lsLoadAll(); // pre-load localStorage data as cache
    showApp();
  })
  .catch(function(e){
    clearTimeout(startupTimer);
    console.warn('Firestore unreachable — switching to localStorage mode:', e.message);
    useLocalStorage=true;
    lsLoadAll();
    setSyncErr();
    var l=document.getElementById('syncLbl');
    if(l)l.textContent='Local only';
    showApp();
  });
function addInternalUpdate(){var t=document.getElementById('iuInput').value.trim();if(!t)return;var n=new Date();var s=n.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})+' '+n.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});db.collection('internalUpdates').add({text:t,ts:s,id:Date.now()}).then(function(){document.getElementById('iuInput').value='';renderInternalUpdates();});}
function renderInternalUpdates(){var el=document.getElementById('iuList');if(!el)return;db.collection('internalUpdates').orderBy('id','desc').get().then(function(snap){var h='';snap.forEach(function(doc){var d=doc.data(),id=doc.id;h+='<div id="iu_'+id+'" style="background:var(--bg4);border:1px solid var(--border2);border-radius:6px;padding:10px 12px;margin-bottom:8px"><div style="font-size:11px;color:var(--text3);margin-bottom:4px">'+d.ts+'</div><div class="iu-txt" style="font-size:13px;color:var(--text);line-height:1.5">'+d.text+'</div><div style="margin-top:8px;display:flex;gap:6px"><button onclick="editIU(this,\''+id+'\')" style="font-size:11px;background:var(--bg3);border:1px solid var(--border2);border-radius:4px;padding:3px 8px;color:var(--text2);cursor:pointer">&#9998; Edit</button><button onclick="delIU(\''+id+'\')" style="font-size:11px;background:var(--bg3);border:1px solid var(--border2);border-radius:4px;padding:3px 8px;color:var(--red);cursor:pointer">&#128465; Del</button></div></div>';});el.innerHTML=h||'<p style="color:var(--text3);font-size:12px;margin:0">No updates yet.</p>';})}
function editIU(b,id){var box=document.getElementById('iu_'+id);if(!box)return;var el=box.querySelector('.iu-txt');var ta=document.createElement('textarea');ta.value=el.innerText;ta.style.cssText='width:100%;background:var(--bg4);border:1px solid var(--accent2);border-radius:4px;padding:6px;color:var(--text);font-size:13px;font-family:inherit;resize:vertical;min-height:55px;box-sizing:border-box;margin-bottom:4px';el.replaceWith(ta);b.textContent='&#128190; Save';b.onclick=function(){db.collection('internalUpdates').doc(id).update({text:ta.value.trim()}).then(function(){renderInternalUpdates();});};}
function delIU(id){if(!confirm('Delete this update?'))return;db.collection('internalUpdates').doc(id).delete().then(function(){renderInternalUpdates();});}
</script>
